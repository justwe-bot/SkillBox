name: Build Main

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bundle:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            platform: macos-latest
            args: --target aarch64-apple-darwin
            artifact_name: skillbox-macos-aarch64
            artifact_path: |
              src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*
              src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*
          - name: macOS Intel
            platform: macos-latest
            args: --target x86_64-apple-darwin
            artifact_name: skillbox-macos-x64
            artifact_path: |
              src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*
              src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*
          - name: Windows
            platform: windows-latest
            args: --bundles nsis
            artifact_name: skillbox-windows-x64
            artifact_path: src-tauri/target/release/bundle/nsis/*
          - name: Linux x64
            platform: ubuntu-22.04
            args: --bundles appimage,deb
            artifact_name: skillbox-linux-x64
            artifact_path: |
              src-tauri/target/release/bundle/appimage/*
              src-tauri/target/release/bundle/deb/*

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libwebkit2gtk-4.1-dev \
            libsoup2.4-dev \
            libgtk-3-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libfuse2 \
            file \
            patchelf

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri bundles
        run: npm run tauri -- build ${{ matrix.args }} --verbose

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
