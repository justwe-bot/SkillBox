name: Build Main

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bundle:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            platform: macos-latest
            args: --target aarch64-apple-darwin
            artifact_name: skillbox-macos-aarch64
            artifact_path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*
          - name: macOS Intel
            platform: macos-latest
            args: --target x86_64-apple-darwin
            artifact_name: skillbox-macos-x64
            artifact_path: src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*
          - name: Windows
            platform: windows-latest
            args: --bundles nsis
            artifact_name: skillbox-windows-x64
            artifact_path: src-tauri/target/release/bundle/nsis/*

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri bundles
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
