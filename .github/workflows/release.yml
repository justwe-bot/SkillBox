name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  bundle:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            platform: macos-latest
            args: --target aarch64-apple-darwin
            artifact_name: skillbox-release-macos-aarch64
            artifact_path: |
              src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*
              src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*
          - name: macOS Intel
            platform: macos-latest
            args: --target x86_64-apple-darwin
            artifact_name: skillbox-release-macos-x64
            artifact_path: |
              src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*
              src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*
          - name: Windows
            platform: windows-latest
            args: --bundles nsis
            artifact_name: skillbox-release-windows-x64
            artifact_path: src-tauri/target/release/bundle/nsis/*
          - name: Linux x64
            platform: ubuntu-22.04
            args: --bundles deb
            artifact_name: skillbox-release-linux-x64
            artifact_path: src-tauri/target/release/bundle/deb/*

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libwebkit2gtk-4.0-dev \
            libjavascriptcoregtk-4.0-dev \
            libsoup2.4-dev \
            libgtk-3-dev \
            libssl-dev \
            libappindicator3-dev \
            librsvg2-dev \
            fakeroot \
            file \
            patchelf

      - name: Check Linux pkg-config versions
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          pkg-config --modversion webkit2gtk-4.0
          pkg-config --modversion javascriptcoregtk-4.0
          pkg-config --modversion libsoup-2.4

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri bundles
        shell: bash
        run: |
          set +e
          set -o pipefail
          npm run tauri -- build ${{ matrix.args }} --verbose 2>&1 | tee /tmp/tauri-build.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            echo "Last 200 lines from the failed Linux build:"
            tail -n 200 /tmp/tauri-build.log || true
            {
              echo "::group::Tauri build failure tail"
              tail -n 80 /tmp/tauri-build.log || true
              echo "::endgroup::"
            } >&2
            tail -n 20 /tmp/tauri-build.log | while IFS= read -r line; do
              sanitized=${line//'%'/'%25'}
              sanitized=${sanitized//$'\r'/'%0D'}
              sanitized=${sanitized//$'\n'/'%0A'}
              echo "::warning::${sanitized}"
            done
            last_line=$(tail -n 1 /tmp/tauri-build.log | tr '\r' ' ' | tr '\n' ' ')
            echo "::error::Tauri build failed. Last log line: ${last_line}"
          fi
          exit "$status"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: bundle

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Collect release files
        run: |
          mkdir -p release-files
          find release-artifacts -type f \( -name '*.dmg' -o -name '*.tar.gz' -o -name '*-setup.exe' -o -name '*.AppImage' -o -name '*.deb' \) -exec cp {} release-files/ \;
          ls -lah release-files

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: SkillBox ${{ github.ref_name }}
          body: See the assets to download this version and install.
          generate_release_notes: true
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: release-files/*
